services:
  agent:
    build:
      context: ../agent
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ../agent/.env
    environment:
      FRONTEND_URL: http://localhost:3000

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      AGENT_URL: http://agent:8000
      NEXT_PUBLIC_AGENT_WS_URL: ws://localhost:8000
    depends_on:
      - agent
