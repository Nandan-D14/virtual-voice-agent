name: 'Build and Deploy Nexus to Cloud Run'

on:
  push:
    branches:
      - 'main'

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: ${{ secrets.GCP_REGION || 'us-central1' }}
  GEMINI_REGION: ${{ secrets.GCP_GEMINI_REGION || 'global' }}
  WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
  AR_REPO: ${{ secrets.GCP_REGION || 'us-central1' }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/nexus

jobs:
  validate:
    runs-on: "ubuntu-latest"

    steps:
      - name: "Checkout"
        uses: "actions/checkout@v4"

      - name: "Set up Node"
        uses: "actions/setup-node@v4"
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: "frontend/package-lock.json"

      - name: "Set up Python"
        uses: "actions/setup-python@v5"
        with:
          python-version: "3.12"

      - name: "Install frontend dependencies"
        working-directory: "./frontend"
        run: npm ci

      - name: "Lint frontend"
        working-directory: "./frontend"
        run: npm run lint

      - name: "Build frontend"
        working-directory: "./frontend"
        env:
          NEXT_PUBLIC_FIREBASE_API_KEY: "ci-firebase-api-key"
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: "ci.example.com"
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: "ci-project"
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: "ci-project.appspot.com"
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "1234567890"
          NEXT_PUBLIC_FIREBASE_APP_ID: "1:1234567890:web:abcdef"
          NEXT_PUBLIC_USE_FIREBASE_EMULATORS: "false"
          NEXT_PUBLIC_AGENT_WS_URL: "ws://localhost:8000"
          AGENT_URL: "http://localhost:8000"
        run: npm run build

      - name: "Install backend dependencies"
        run: |
          python -m pip install --upgrade pip
          python -m pip install ./agent

      - name: "Compile backend"
        run: python -m compileall agent/nexus

      - name: "Backend smoke tests"
        run: python -m unittest discover -s agent/tests -v

  deploy:
    needs: validate
    runs-on: 'ubuntu-latest'

    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: 'Checkout'
        uses: 'actions/checkout@v4'

      - id: 'auth'
        name: 'Authenticate to Google Cloud'
        uses: 'google-github-actions/auth@v2'
        with:
          workload_identity_provider: '${{ env.WORKLOAD_IDENTITY_PROVIDER }}'

      - name: 'Set up Cloud SDK'
        uses: 'google-github-actions/setup-gcloud@v2'

      - name: 'Docker Auth'
        uses: 'docker/login-action@v3'
        with:
          username: 'oauth2accesstoken'
          password: '${{ steps.auth.outputs.auth_token }}'
          registry: '${{ env.REGION }}-docker.pkg.dev'

      - name: 'Ensure Artifact Registry repository exists'
        run: |-
          gcloud artifacts repositories create nexus \
            --project="${{ env.PROJECT_ID }}" \
            --repository-format=docker \
            --location="${{ env.REGION }}" \
            --description="NEXUS container images" 2>/dev/null || true

      - name: 'Build Agent Image (Cloud Build)'
        run: |-
          AGENT_IMAGE="${{ env.AR_REPO }}/nexus-agent:${{ github.sha }}"
          gcloud builds submit \
            --project="${{ env.PROJECT_ID }}" \
            --tag="${AGENT_IMAGE}" \
            ./agent
          echo "AGENT_IMAGE=${AGENT_IMAGE}" >> $GITHUB_ENV

      - name: 'Deploy Agent to Cloud Run'
        run: |-
          SECRET_FLAGS=("--set-secrets=E2B_API_KEY=e2b-api-key:latest")
          if [[ -n "${{ secrets.BYOK_ENCRYPTION_KEY_SECRET }}" ]]; then
            SECRET_FLAGS+=("--set-secrets=BYOK_ENCRYPTION_KEY=${{ secrets.BYOK_ENCRYPTION_KEY_SECRET }}:latest")
          fi

          AGENT_ENV_VARS=(
            "APP_ENV=production"
            "FIREBASE_PROJECT_ID=${{ secrets.FIREBASE_PROJECT_ID }}"
            "GOOGLE_PROJECT_ID=${{ env.PROJECT_ID }}"
            "GOOGLE_CLOUD_REGION=${{ env.GEMINI_REGION }}"
            "GOOGLE_CLOUD_PROJECT=${{ env.PROJECT_ID }}"
            "GOOGLE_CLOUD_LOCATION=${{ env.GEMINI_REGION }}"
            "GOOGLE_GENAI_USE_VERTEXAI=true"
            "GOOGLE_OAUTH_CLIENT_ID=${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}"
            "GOOGLE_OAUTH_CLIENT_SECRET=${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}"
            "REQUIRE_BYOK=${{ secrets.REQUIRE_BYOK || 'false' }}"
            "SHARED_ACCESS_CODE=${{ secrets.SHARED_ACCESS_CODE }}"
            "BETA_ENFORCE_BYOK=${{ secrets.BETA_ENFORCE_BYOK || 'true' }}"
            "BETA_ADMIN_EMAILS=${{ secrets.BETA_ADMIN_EMAILS }}"
            "BETA_GOOGLE_SHEET_ID=${{ secrets.BETA_GOOGLE_SHEET_ID }}"
            "BETA_GOOGLE_SHEET_NAME=${{ secrets.BETA_GOOGLE_SHEET_NAME || 'beta_applications' }}"
            "JWT_SECRET=${{ secrets.JWT_SECRET }}"
          )
          AGENT_ENV_VARS_CSV="$(IFS=,; printf '%s' "${AGENT_ENV_VARS[*]}")"

          gcloud run deploy nexus-agent \
            --project="${{ env.PROJECT_ID }}" \
            --region="${{ env.REGION }}" \
            --image="${{ env.AGENT_IMAGE }}" \
            --port=8000 \
            --memory=1Gi \
            --cpu=1 \
            --timeout=3600 \
            --concurrency=10 \
            --allow-unauthenticated \
            "${SECRET_FLAGS[@]}" \
            --set-env-vars="${AGENT_ENV_VARS_CSV}"

          AGENT_URL="$(gcloud run services describe nexus-agent \
            --project="${{ env.PROJECT_ID }}" \
            --region="${{ env.REGION }}" \
            --format='value(status.url)')"
          
          AGENT_WS_URL="${AGENT_URL/https:/wss:}"
          
          echo "AGENT_URL=${AGENT_URL}" >> $GITHUB_ENV
          echo "AGENT_WS_URL=${AGENT_WS_URL}" >> $GITHUB_ENV

      - name: 'Build Frontend Image (Cloud Build)'
        run: |-
          FRONTEND_IMAGE="${{ env.AR_REPO }}/nexus-frontend:${{ github.sha }}"
          gcloud builds submit \
            --project="${{ env.PROJECT_ID }}" \
            --config="./frontend/cloudbuild.yaml" \
            --substitutions="_IMAGE=${FRONTEND_IMAGE},_NEXT_PUBLIC_FIREBASE_API_KEY=${{ secrets.FIREBASE_API_KEY }},_NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${{ secrets.FIREBASE_AUTH_DOMAIN }},_NEXT_PUBLIC_FIREBASE_PROJECT_ID=${{ secrets.FIREBASE_PROJECT_ID }},_NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=${{ secrets.FIREBASE_STORAGE_BUCKET }},_NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.FIREBASE_MESSAGING_SENDER_ID }},_NEXT_PUBLIC_FIREBASE_APP_ID=${{ secrets.FIREBASE_APP_ID }},_NEXT_PUBLIC_USE_FIREBASE_EMULATORS=false,_NEXT_PUBLIC_AGENT_WS_URL=${{ env.AGENT_WS_URL }}" \
            ./frontend
          echo "FRONTEND_IMAGE=${FRONTEND_IMAGE}" >> $GITHUB_ENV

      - name: 'Deploy Frontend to Cloud Run'
        run: |-
          gcloud run deploy nexus-frontend \
            --project="${{ env.PROJECT_ID }}" \
            --region="${{ env.REGION }}" \
            --image="${{ env.FRONTEND_IMAGE }}" \
            --port=3000 \
            --memory=512Mi \
            --cpu=1 \
            --timeout=300 \
            --concurrency=80 \
            --allow-unauthenticated \
            --set-env-vars="AGENT_URL=${{ env.AGENT_URL }}"

          FRONTEND_URL="$(gcloud run services describe nexus-frontend \
            --project="${{ env.PROJECT_ID }}" \
            --region="${{ env.REGION }}" \
            --format='value(status.url)')"
            
          echo "FRONTEND_URL=${FRONTEND_URL}" >> $GITHUB_ENV

      - name: 'Update Agent CORS Origin'
        run: |-
          gcloud run services update nexus-agent \
            --project="${{ env.PROJECT_ID }}" \
            --region="${{ env.REGION }}" \
            --update-env-vars="FRONTEND_URL=${{ env.FRONTEND_URL }}"
