name: 'Build and Deploy Nexus to Cloud Run'

on:
  push:
    branches:
      - 'main'
      - 'developer'
      - 'fix-cicd-pipeline'

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: ${{ secrets.GCP_REGION || 'us-central1' }}
  GEMINI_REGION: ${{ secrets.GCP_GEMINI_REGION || 'global' }}
  WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
  AR_REPO: ${{ secrets.GCP_REGION || 'us-central1' }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/nexus

jobs:
  deploy:
    runs-on: 'ubuntu-latest'

    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: 'Checkout'
        uses: 'actions/checkout@v4'

      - id: 'auth'
        name: 'Authenticate to Google Cloud'
        uses: 'google-github-actions/auth@v2'
        with:
          workload_identity_provider: 'projects/422420122490/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
          service_account: 'vertex-express@virtual-voice-agent-490118.iam.gserviceaccount.com'
          token_format: 'access_token'

      - name: 'Set up Cloud SDK'
        uses: 'google-github-actions/setup-gcloud@v2'

      - name: 'Docker Auth'
        uses: 'docker/login-action@v3'
        with:
          username: 'oauth2accesstoken'
          password: '${{ steps.auth.outputs.access_token }}'
          registry: '${{ env.REGION }}-docker.pkg.dev'

      - name: 'Ensure Artifact Registry repository exists'
        run: |-
          gcloud artifacts repositories create nexus \
            --project="${{ env.PROJECT_ID }}" \
            --repository-format=docker \
            --location="${{ env.REGION }}" \
            --description="NEXUS container images" 2>/dev/null || true

      - name: 'Build and Push Agent Image'
        run: |-
          AGENT_IMAGE="${{ env.AR_REPO }}/nexus-agent:${{ github.sha }}"
          docker build -t "${AGENT_IMAGE}" ./agent
          docker push "${AGENT_IMAGE}"
          echo "AGENT_IMAGE=${AGENT_IMAGE}" >> $GITHUB_ENV

      - name: 'Deploy Agent to Cloud Run'
        run: |-
          SECRET_FLAGS=("--set-secrets=E2B_API_KEY=e2b-api-key:latest")
          if [[ -n "${{ secrets.BYOK_ENCRYPTION_KEY_SECRET }}" ]]; then
            SECRET_FLAGS+=("--set-secrets=BYOK_ENCRYPTION_KEY=${{ secrets.BYOK_ENCRYPTION_KEY_SECRET }}:latest")
          fi

          AGENT_ENV_VARS=(
            "FIREBASE_PROJECT_ID=${{ secrets.FIREBASE_PROJECT_ID }}"
            "GOOGLE_PROJECT_ID=${{ env.PROJECT_ID }}"
            "GOOGLE_CLOUD_REGION=${{ env.GEMINI_REGION }}"
            "GOOGLE_CLOUD_PROJECT=${{ env.PROJECT_ID }}"
            "GOOGLE_CLOUD_LOCATION=${{ env.GEMINI_REGION }}"
            "GOOGLE_GENAI_USE_VERTEXAI=true"
            "GOOGLE_OAUTH_CLIENT_ID=${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}"
            "GOOGLE_OAUTH_CLIENT_SECRET=${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}"
            "REQUIRE_BYOK=${{ secrets.REQUIRE_BYOK || 'false' }}"
            "SHARED_ACCESS_CODE=${{ secrets.SHARED_ACCESS_CODE }}"
          )
          AGENT_ENV_VARS_CSV="$(IFS=,; printf '%s' "${AGENT_ENV_VARS[*]}")"

          gcloud run deploy nexus-agent \
            --project="${{ env.PROJECT_ID }}" \
            --region="${{ env.REGION }}" \
            --image="${{ env.AGENT_IMAGE }}" \
            --port=8000 \
            --memory=1Gi \
            --cpu=1 \
            --timeout=3600 \
            --concurrency=10 \
            --allow-unauthenticated \
            "${SECRET_FLAGS[@]}" \
            --set-env-vars="${AGENT_ENV_VARS_CSV}"

          AGENT_URL="$(gcloud run services describe nexus-agent \
            --project="${{ env.PROJECT_ID }}" \
            --region="${{ env.REGION }}" \
            --format='value(status.url)')"
          
          AGENT_WS_URL="${AGENT_URL/https:/wss:}"
          
          echo "AGENT_URL=${AGENT_URL}" >> $GITHUB_ENV
          echo "AGENT_WS_URL=${AGENT_WS_URL}" >> $GITHUB_ENV

      - name: 'Build and Push Frontend Image'
        run: |-
          FRONTEND_IMAGE="${{ env.AR_REPO }}/nexus-frontend:${{ github.sha }}"
          docker build \
            --build-arg NEXT_PUBLIC_FIREBASE_API_KEY="${{ secrets.FIREBASE_API_KEY }}" \
            --build-arg NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN="${{ secrets.FIREBASE_AUTH_DOMAIN }}" \
            --build-arg NEXT_PUBLIC_FIREBASE_PROJECT_ID="${{ secrets.FIREBASE_PROJECT_ID }}" \
            --build-arg NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET="${{ secrets.FIREBASE_STORAGE_BUCKET }}" \
            --build-arg NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID="${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}" \
            --build-arg NEXT_PUBLIC_FIREBASE_APP_ID="${{ secrets.FIREBASE_APP_ID }}" \
            --build-arg NEXT_PUBLIC_USE_FIREBASE_EMULATORS=false \
            --build-arg NEXT_PUBLIC_AGENT_WS_URL="${{ env.AGENT_WS_URL }}" \
            -t "${FRONTEND_IMAGE}" ./frontend
          docker push "${FRONTEND_IMAGE}"
          echo "FRONTEND_IMAGE=${FRONTEND_IMAGE}" >> $GITHUB_ENV

      - name: 'Deploy Frontend to Cloud Run'
        run: |-
          gcloud run deploy nexus-frontend \
            --project="${{ env.PROJECT_ID }}" \
            --region="${{ env.REGION }}" \
            --image="${{ env.FRONTEND_IMAGE }}" \
            --port=3000 \
            --memory=512Mi \
            --cpu=1 \
            --timeout=300 \
            --concurrency=80 \
            --allow-unauthenticated \
            --set-env-vars="AGENT_URL=${{ env.AGENT_URL }}"

          FRONTEND_URL="$(gcloud run services describe nexus-frontend \
            --project="${{ env.PROJECT_ID }}" \
            --region="${{ env.REGION }}" \
            --format='value(status.url)')"
            
          echo "FRONTEND_URL=${FRONTEND_URL}" >> $GITHUB_ENV

      - name: 'Update Agent CORS Origin'
        run: |-
          gcloud run services update nexus-agent \
            --project="${{ env.PROJECT_ID }}" \
            --region="${{ env.REGION }}" \
            --update-env-vars="FRONTEND_URL=${{ env.FRONTEND_URL }}"
